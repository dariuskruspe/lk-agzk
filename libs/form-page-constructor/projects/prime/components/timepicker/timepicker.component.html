<div [formGroup]="form">
  <label class="custom-form-field__label" [for]="item.formControlName"
    >{{ item.label }}{{ isRequired() ? ' *' : '' }}</label
  >

  <p-calendar
    #timepicker
    [(ngModel)]="timeValue"
    [ngModelOptions]="{ standalone: true }"
    (onSelect)="timeBinding(item.formControlName, timepicker.value)"
    (onBlur)="timeBinding(item.formControlName, timepicker.value)"
    [inputId]="item.formControlName"
    [placeholder]="item.placeholder || ('SELECT_TIME' | translate)"
    [timeOnly]="true"
    appendTo="body"
  >
  </p-calendar>
</div>
