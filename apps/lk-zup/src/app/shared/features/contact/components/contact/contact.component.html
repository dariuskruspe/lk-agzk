<div class="contact-container">
  <div class="contact-container__description">
    {{ 'CONTACT_DESCTIPTION' | translate }}
  </div>
  <form
    class="contact-container__form" [formGroup]="formGroup"
  >
    <div class="form-field">
      <span class="font-bold block mb-2">{{ 'CONTACT_NAME' | translate }}</span>
      <input
        pInputText formControlName="name" placeholder="{{ 'CONTACT_NAME_PLACEHOLDER' | translate }}"
      />
    </div>
    <div class="form-field">
      <span class="font-bold block mb-2">{{ 'CONTACT_PHONE' | translate }}</span>
      <p-inputMask
        mask="9 (999) 999-9999" formControlName="phone" placeholder="(999) 999-9999"
      ></p-inputMask>
    </div>
    <div class="form-field">
      <span class="font-bold block mb-2">{{ 'CONTACT_EMAIL' | translate }}</span>
      <input
        pInputText formControlName="email" placeholder="{{ 'CONTACT_EMAIL_PLACEHOLDER' | translate }}"
      />
    </div>
    <div
      *ngIf="hasError && formGroup.invalid" class="contact-container__form_error"
    >
      {{ 'CONTACT_ERROR' | translate }}
    </div>
  </form>

  <div class="contact-container__buttons">
    <button
      pButton
      icon="pi"
      [disabled]="loading"
      [loading]="loading"
      type="button"
      (click)="submitForm()"
      label="{{ 'BUTTON_SEND' | translate }}"
    >
    </button>
  </div>
</div>
