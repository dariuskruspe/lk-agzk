<p-card class="profile-contacts">
  <div class="flex jc-space-between ai-center">
    <h3 class="mb-0">
      {{ 'CONTACT_INFO' | translate | uppercase }}
    </h3>

    @if (settings?.userProfile?.changeContactsButton?.enable) {
      <button
        (click)="onEditContacts()"
        pButton
        class="p-button-text p-0"
        icon="pi pi-pencil"
        iconPos="left"
        [label]="''"
      ></button>
    }
  </div>

  <app-item-list [items]="personalData?.contacts" titleKey="contactType" valueKey="contactValue"></app-item-list>
