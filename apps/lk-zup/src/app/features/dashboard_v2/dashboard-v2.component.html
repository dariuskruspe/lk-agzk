@if (isV2Enabled()) {
  <div class="dashboard-v2">
    <div class="left-side flex-1">
      <app-dashboard-v2-tasks-widget #widget />
    </div>
    <div class="dashboard-v2__right">
      <div class="dashboard-v2__right-widgets">
        <app-dashboard-v2-calendar-widget #widget />
        <app-dashboard-v2-salary-widget #widget />
        <app-dashboard-v2-vacation-widget #widget />
      </div>
    </div>
  </div>
} @else {
  <app-dashboard-main-container />
}
