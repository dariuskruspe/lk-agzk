<p-card styleClass="vacation-balance">
  <div class="vacation-balance__container">
    <div class="vacation-balance__header">
      <p class="vacation-balance__title">
        Отпуск на
        <app-date-picker
          [(value)]="selectedDate"
          dateFormat="DD.MM.YYYY"
          [firstDayOfWeek]="1"
        >
          <ng-template #trigger let-displayValue="displayValue">
            <div class="vacation-balance__date-picker-trigger">
              <span>{{ displayValue }}</span>
              <lucide-icon [name]="ChevronDownIcon"></lucide-icon>
            </div>
          </ng-template>
        </app-date-picker>
      </p>
    </div>

    <button
      class="vacation-balance__download-btn"
      aria-label="Скачать"
      (click)="download()"
    >
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path
          d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M7 10L12 15L17 10"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M12 15V3"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>

    <p class="vacation-balance__days">
      @if (loading()) {
        <div><i class="pi pi-spinner pi-spin"></i></div>
      } @else {
        {{ vacationDaysDisplay() }}
      }
    </p>
  </div>
</p-card>
