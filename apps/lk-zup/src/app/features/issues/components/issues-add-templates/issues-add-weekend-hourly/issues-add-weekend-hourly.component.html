<div class="container-fluid">
  <div class="row">
    <p-toolbar class="title nowrap">
      <button
        pButton
        class="p-button-rounded p-button-outlined"
        icon="pi pi-arrow-left"
        (click)="onBackPage()"
      ></button>
      <h1>
        {{ issuesType?.FullName }}
      </h1>
    </p-toolbar>
    <form
      [formGroup]="form"
      (ngSubmit)="getValidWeekendWork(); onSubmit()"
      class="col-md-8 p-0 weekend-work-form"
    >
      <p-card>
        <ng-container *ngFor="let day of weekendWork.controls; index as i">
          <div
            class="row"
            [formGroup]="day"
          >
            <div class="col-10">
              <div
                class="custom-form-field"
                [ngClass]="findDayTemplate('dateBegin')?.gridClasses"
              >
                <label
                  class="custom-form-field__label"
                  for="dateBegin"
                >
                  {{ findDayTemplate('dateBegin')?.label }}
                </label>
                <ng-container
                  *map="
                    [
                      findDayTemplate('dateBegin')?.startDateMathDay
                        ? mathDayUtils.mathCurrentDateDay(
                            findDayTemplate('dateBegin')?.startDateMathDay
                          )
                        : '',
                      findDayTemplate('dateBegin')?.endDateMathDay
                        ? mathDayUtils.mathCurrentDateDay(
                            findDayTemplate('dateBegin')?.endDateMathDay
                          )
                        : ''
                    ];
                    handler: toDate;
                    let values
                  "
                >
                  <p-calendar
                    [formField]="day"
                    [firstDayOfWeek]="1"
                    [showIcon]="true"
                    inputId="dateBegin"
                    appendTo="body"
                    formControlName="dateBegin"
                    [minDate]="values[0]"
                    [maxDate]="values[1]"
                    [selectOtherMonths]="true"
                    [readonlyInput]="isMobile"
                    (ngModelChange)="dateBinding('dateBegin', $event, i)"
                  >
                    <ng-template pTemplate="date" let-date>
                  <span [ngClass]="{'weekend': isWeekend(date)}">
                    {{ date.day }}
                  </span>
                    </ng-template>
                  </p-calendar>
                </ng-container>
              </div>
            </div>
            <div class="col-2 tools-container">
              <button
                pButton
                icon="pi pi-times"
                class="p-button-rounded p-button-danger p-button-text tools-container__button_remove"
                (click)="removeSmartFormGroup(i)"
              ></button>
            </div>
            <div class="col-12 row">
              <div
                *ngIf="day.get('hoursWorked')"
                class="custom-form-field"
              >
                <label class="custom-form-field__label">
                  {{ findDayTemplate('hoursWorked')?.label }}
                </label> <input
                type="text"
                [formField]="day"
                formControlName="hoursWorked"
                pInputText
              />
              </div>
            </div>
            <div class="col-12 row">
              <div
                class="custom-form-field"
                *ngIf="
                  day.get('payType1') &&
                  optionLists &&
                  optionLists['weekendCompensation']
                "
                [ngClass]="
                  day.get('dayOff1') ? ['col-md-6', 'col-sm-12'] : ['col-12']
                "
              >
                <label class="custom-form-field__label">
                  {{ findDayTemplate('payType1')?.label }}
                </label>
                <p-dropdown
                  [formField]="day"
                  [autoDisplayFirst]="false"
                  [ngClass]="
                    checkDisabling(form.value.weekendWork.value, i)
                      ? ['disabled-input']
                      : ['']
                  "
                  formControlName="payType1"
                  [options]="
                    optionLists['weekendCompensation']['optionList'] || []
                  "
                  optionValue="value"
                  [placeholder]="findDayTemplate('payType1')?.placeholder"
                  optionLabel="representation"
                  (onChange)="changePayType($event, 1, i)"
                >
                  <ng-template
                    *ngIf="selectedItem"
                    let-item
                    pTemplate="selectedItem"
                  >
                    {{ selectedItem }}
                  </ng-template>
                </p-dropdown>
              </div>
              <div
                *ngIf="
                  day.get('dayOff1') &&
                  settings.weekendWork.isDayOffDateRequired
                "
                class="custom-form-field"
                [ngClass]="['col-md-6', 'col-sm-12']"
              >
                <label class="custom-form-field__label">
                  {{ findDayTemplate('dayOff1')?.label }}
                </label>
                <p-calendar
                  [formField]="form"
                  [firstDayOfWeek]="1"
                  [showIcon]="true"
                  appendTo="body"
                  formControlName="dayOff1"
                  [selectOtherMonths]="true"
                  [readonlyInput]="isMobile"
                  (ngModelChange)="dateBinding('dayOff1', $event, i)"
                >
                  <ng-template pTemplate="date" let-date>
                  <span [ngClass]="{'weekend': isWeekend(date)}">
                    {{ date.day }}
                  </span>
                  </ng-template>
                </p-calendar>
              </div>
            </div>
          </div>
        </ng-container>
        <div class="factory-item">
          <button
            pButton
            icon="pi pi-plus"
            class="button-xs-full"
            type="button"
            iconPos="left"
            [disabled]="!weekendWork.value[0].payType1.length"
            label="{{ findTemplateItem('weekendWork')?.label }}"
            (click)="addWeekendWork(form.value.weekendWork.value)"
          ></button>
        </div>
        <div
          *ngIf="
            settingsFacade.getData()?.weekendWork?.basisEnable &&
            optionLists &&
            optionLists['basisweekend']
          "
          class="custom-form-field"
          [ngClass]="findTemplateItem('basisweekend')?.gridClasses"
        >
          <label class="custom-form-field__label">
            {{ findTemplateItem('basisweekend')?.label }}
          </label>
          <p-dropdown
            [formField]="form"
            [autoDisplayFirst]="false"
            formControlName="basisweekend"
            [options]="optionLists['basisweekend']['optionList'] || []"
            [placeholder]="findTemplateItem('basisweekend')?.placeholder"
            optionValue="value"
            optionLabel="representation"
            (onChange)="
              this.toggleBasisOtherControl(
                'basisOther',
                this.form.get('basisweekend').value
              )
            "
          ></p-dropdown>
        </div>
        <div
          *ngIf="form.controls['basisOther']"
          class="custom-form-field"
          [ngClass]="findTemplateItem('basisOther')?.gridClasses"
        >
          <label class="custom-form-field__label">
            {{ findTemplateItem('basisOther')?.label }}
          </label> <input
          pInputText
          [formField]="form"
          formControlName="basisOther"
        />
        </div>
        <div
          class="custom-form-field"
          [ngClass]="findTemplateItem('message')?.gridClasses"
        >
          <label class="custom-form-field__label">
            {{ findTemplateItem('message')?.label }}
          </label> <textarea
          pInputTextarea
          formControlName="message"
          rows="5"
          [autoResize]="true"
        ></textarea>
        </div>
        <fpc
          [formData]="modifiedFormData"
          [dateLocale]="dateLocale"
          [loading]="loading"
          (formSubmit)="handleSubmit($event)"
          [submit$]="submit$"
          class="additional-fields p-0"
        ></fpc>
        <p-toolbar class="buttons no-margin">
          <button
            pButton
            label="{{ 'BUTTON_SEND' | translate }}"
            class="col-12 col-md-auto"
            type="submit"
            [disabled]="loading"
          ></button>
          <button
            pButton
            label="{{ 'BUTTON_CANCEL' | translate }}"
            class="col-12 col-md-auto p-button-outlined"
            [routerLink]="['', 'issues', 'types']"
          ></button>
        </p-toolbar>
      </p-card>
    </form>
    <div
      class="additional-info col-md-4 mb-4"
    >
      <app-item-list
        *ngIf="issuesType?.options?.staticText"
        [items]="issuesType?.options?.staticText"
        font="13px"
      ></app-item-list>
      <div *ngIf="employeesApprovingPersons?.length" class="approver-title">
        <span *ngIf="employeesApprovingPersons.length === 1">{{ 'EMPLOYEE_APPROVER' | translate }}</span>
        <span *ngIf="employeesApprovingPersons.length > 1">{{ 'EMPLOYEE_APPROVERS' | translate }}</span>
        :
        <div *ngFor="let approvePerson of employeesApprovingPersons" class="value">
          {{approvePerson}}
        </div>
      </div>
      <app-item-link-list
        [items]="issuesType?.crossPeriods || []"
      ></app-item-link-list>
      <button
        *ngIf="issuesType?.options?.showProfileButton"
        pButton
        label="{{ 'BUTTON_VIEW_PROFILE' | translate }}"
        icon="pi pi-external-link"
        iconPos="right"
        class="button-full-xs round p-button-text"
        [routerLink]="['', 'users', 'profile']"
      ></button>
    </div>
  </div>
</div>
