<div *ngIf="isEnabled && reports">
  <div
    *ngFor="let report of reports.reports; let i = index"
    class="custom-widget-item"
  >
    <p-toolbar class="title">
      <h2 class="dashboard-title mobile-title">{{ report.name }}</h2>
      <span class="spacer"></span>
      <button
        pButton
        type="button"
        class="button-full-xs title-button"
        label="{{ 'CREATE_CUSTOM_REPORT' | translate }}"
        (click)="createReport(i)"
      ></button>
    </p-toolbar>
    <div class="row vacations-block">
      <div class="main-leave col-md-12">
        <app-card [withPaddings]="false">
          <div class="vacation__block">
            @if (report.description) {
              <div class="description">
                {{ report.description }}
              </div>
            }

            @if (!report.hidePeriodSelection) {
              <p-calendar
                *ngIf="report.period === 'month'"
                [showIcon]="true"
                [(ngModel)]="selectedDate[i]"
                [readonlyInput]="true"
                view="month"
                dateFormat="mm.yy"
                [minDate]="getDate(report.dateBegin)"
                [maxDate]="getDate(report.dateEnd)"
                appendTo="body"
              ></p-calendar>
              <p-calendar
                *ngIf="report.period === 'day'"
                [showIcon]="true"
                [readonlyInput]="true"
                [(ngModel)]="selectedDate[i]"
                [minDate]="getDate(report.dateBegin)"
                [maxDate]="getDate(report.dateEnd)"
                appendTo="body"
              >
                <ng-template pTemplate="date" let-date>
                  <span [ngClass]="{ weekend: isWeekend(date) }">
                    {{ date.day }}
                  </span>
                </ng-template>
              </p-calendar>
              <p-calendar
                *ngIf="report.period === 'year'"
                [showIcon]="true"
                [readonlyInput]="true"
                view="year"
                dateFormat="yy"
                [(ngModel)]="years[i]"
                [minDate]="getDate(report.dateBegin)"
                [maxDate]="getDate(report.dateEnd)"
              ></p-calendar>
              <div *ngIf="report.period === 'custom'" class="custom-dates">
                <div class="start-date">
                  <p-calendar
                    [showIcon]="true"
                    [readonlyInput]="true"
                    [(ngModel)]="selectedDate[i].dateBegin"
                    [minDate]="getDate(report.dateBegin)"
                    [maxDate]="getDate(report.dateEnd)"
                  >
                    <ng-template pTemplate="date" let-date>
                      <span [ngClass]="{ weekend: isWeekend(date) }">
                        {{ date.day }}
                      </span>
                    </ng-template>
                  </p-calendar>
                </div>
                <div class="end-date">
                  <p-calendar
                    [showIcon]="true"
                    [readonlyInput]="true"
                    [(ngModel)]="selectedDate[i].dateEnd"
                    [minDate]="getDate(report.dateBegin)"
                    [maxDate]="getDate(report.dateEnd)"
                  >
                    <ng-template pTemplate="date" let-date>
                      <span [ngClass]="{ weekend: isWeekend(date) }">
                        {{ date.day }}
                      </span>
                    </ng-template>
                  </p-calendar>
                </div>
              </div>
            }
          </div>
        </app-card>
      </div>
    </div>
  </div>
</div>
